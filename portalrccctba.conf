server {
    listen 80;
    listen [::]:80;
    server_name rcccuritiba.com.br www.rcccuritiba.com.br;

    # Redireciona HTTP para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name rcccuritiba.com.br www.rcccuritiba.com.br;

    ssl_certificate /etc/letsencrypt/live/rcccuritiba.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rcccuritiba.com/privkey.pem;
    client_max_body_size 500M;

    # Aplicação principal
    root /var/www/html/portalrccctba;
    index index.php index.html;

    # Arquivos estáticos da aplicação
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot|pdf|mp4|webm|mov)$ {
        try_files $uri =404;
    }

    location /assets/ {
        try_files $uri =404;
    }

    location /videos/ {
        alias /var/www/html/portalrccctba/videos/;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;
        add_header Accept-Ranges bytes always;
        add_header Cache-Control "no-store" always;
        types {
            video/mp4 mp4;
            video/webm webm;
            video/ogg ogv;
        }
        try_files $uri =404;
    }

    # Proxy para APIs
    location /api/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "$http_origin" always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,Accept-Ranges' always;
            add_header 'Content-Length' 0;
            return 204;
        }
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_cache off;
        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,Accept-Ranges' always;
        add_header 'Cache-Control' 'no-store, no-cache, must-revalidate, proxy-revalidate';
        error_log /var/log/nginx/api_error.log debug;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PHP para a aplicação
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php7.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }


# phpMyAdmin
location /phpmyadmin {
    root /usr/share/;
    index index.php index.html index.htm;

    location ~ ^/phpmyadmin/(.+\.php)$ {
        root /usr/share/;
        fastcgi_pass unix:/var/run/php/php7.4-fpm.sock;
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~* ^/phpmyadmin/(.+\.(?:css|js|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg|eot))$ {
        root /usr/share/;
    }
}



}
